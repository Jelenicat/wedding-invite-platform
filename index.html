<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Cinzel:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Italianno&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap"
      rel="stylesheet"
    />

    <!-- Viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- SEO -->
    <title>Digitalne pozivnice za venčanje</title>
    <meta
      name="description"
      content="Otvorite digitalnu pozivnicu i saznajte sve detalje o venčanju."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Digitalne pozivnice za venčanje" />
    <meta
      property="og:description"
      content="Kliknite i otvorite digitalnu pozivnicu."
    />
    <meta
      property="og:image"
      content="https://mojapozivnica.app/previews/default.jpg"
    />
    <meta property="og:url" content="https://mojapozivnica.app/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Digitalne pozivnice za venčanje" />
    <meta
      name="twitter:description"
      content="Kliknite i otvorite digitalnu pozivnicu."
    />
    <meta
      name="twitter:image"
      content="https://mojapozivnica.app/previews/default.jpg"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
